<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Infinite Runner - MagnorioBR</title><style>
*{margin:0;padding:0}body{background:#000;overflow:hidden;font-family:Arial}
#load{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffb833;font-size:2rem;z-index:99}
canvas{display:block}
</style></head><body>
<div id="load">CARREGANDO...</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── CONFIG ──
const BS=100,RW=10,SW=3,VD=300;
const hr=RW/2,se=hr+SW;
const $=id=>document.getElementById(id);

// ── CANVAS TEXTURE GENERATOR ──
function makeTex(color,noiseColor,count,size){
  const c=document.createElement('canvas');c.width=256;c.height=256;
  const x=c.getContext('2d');
  x.fillStyle=color;x.fillRect(0,0,256,256);
  if(noiseColor&&count>0){
    for(let i=0;i<count;i++){
      x.fillStyle=noiseColor;
      const s=size||3;
      x.fillRect(Math.random()*256,Math.random()*256,s,s);
    }
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=THREE.RepeatWrapping;t.wrapT=THREE.RepeatWrapping;t.colorSpace=THREE.SRGBColorSpace;
  return t;
}

// ── TEXTURAS DO TERRENO ──
const T={};
T.asphalt=[];
T.sidewalk=[];
T.grass=[];
T.dirt=[];
T.sand=[];
T.brick=[];

for(let i=0;i<4;i++)T.asphalt.push(makeTex('#3d3d3f','#2a2a2c',6000,2));
for(let i=0;i<3;i++)T.sidewalk.push(makeTex('#c8c0b8','#b0a8a0',4000,1));
for(let i=0;i<3;i++)T.grass.push(makeTex('#4a8c3f','#3d7a35',8000,2));
for(let i=0;i<3;i++)T.dirt.push(makeTex('#8b7355','#7d664a',6000,2));
for(let i=0;i<3;i++)T.sand.push(makeTex('#e8d5b0','#ddc9a5',5000,1));
for(let i=0;i<4;i++)T.brick.push(makeTex('#b8956a','#a0805a',3000,1));

function getTex(pool,seed){
  if(!pool||!pool.length)return T.asphalt[0];
  const t=pool[Math.abs(seed)%pool.length].clone();
  t.needsUpdate=true;return t;
}

// ── SCENE / RENDERER / CAMERA / LIGHT ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0xCCDDFF,60,VD);

const cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,VD+100);
cam.position.set(0,1.7,0);

const rnd=new THREE.WebGLRenderer({antialias:true});
rnd.setSize(innerWidth,innerHeight);
rnd.setPixelRatio(Math.min(devicePixelRatio,2));
rnd.shadowMap.enabled=true;
document.body.appendChild(rnd.domElement);

// ── LUZ FORTE ──
const sun=new THREE.DirectionalLight(0xffffff,3);
sun.position.set(60,100,40);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=1;sun.shadow.camera.far=500;
sun.shadow.camera.left=-80;sun.shadow.camera.right=80;sun.shadow.camera.top=80;sun.shadow.camera.bottom=-80;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x8899aa,2.0));
scene.add(new THREE.HemisphereLight(0x88aacc,0x554433,1.0));

// ── MATERIAIS ──
const matCurb=new THREE.MeshLambertMaterial({color:0x999999});
const matYel=new THREE.MeshLambertMaterial({color:0xffcc00});
const matTree=new THREE.MeshLambertMaterial({color:0x6D4C41});
const matLeaf=new THREE.MeshLambertMaterial({color:0x4a8c3f});

// ── MUNDO (TERRENO 100% FOCO) ──
const blocks=new Map();

function mkBlock(bx,bz){
  const k=bx+','+bz;if(blocks.has(k))return;
  const seed=bx*374761393+bz*668265263;
  
  // ═══ TERRENO ═══
  const geo=new THREE.PlaneGeometry(BS+.5,BS+.5,8,8);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position.array;
  for(let i=0;i<pos.length;i+=3){
    const ax=Math.abs(pos[i]);
    if(ax<hr)pos[i+1]=0;
    else if(ax<se)pos[i+1]=0.15+(ax-hr)/SW*0.02;
    else pos[i+1]=0.3+Math.sin(pos[i]*0.04)*0.15;
  }
  geo.computeVertexNormals();
  
  // Textura do chão
  const gTex=getTex(T.asphalt,seed+bx+bz);
  gTex.repeat.set(4,4);
  const gMat=new THREE.MeshLambertMaterial({map:gTex});
  const mesh=new THREE.Mesh(geo,gMat);mesh.receiveShadow=true;
  
  const g=new THREE.Group();g.add(mesh);
  g.position.set(bx*BS,0,bz*BS);mesh.position.set(0,0,0);
  
  // ═══ MEIO-FIO ═══
  const cGeo=new THREE.BoxGeometry(0.25,0.12,BS+.5);
  for(let s=-1;s<=1;s+=2){
    const curb=new THREE.Mesh(cGeo,matCurb);
    curb.position.set(s*hr,0.06,0);curb.castShadow=true;curb.receiveShadow=true;
    g.add(curb);
  }
  
  // ═══ FAIXA AMARELA ═══
  const dGeo=new THREE.PlaneGeometry(0.2,3);
  for(let z=-48;z<48;z+=7){
    const d=new THREE.Mesh(dGeo,matYel);
    d.rotation.x=-Math.PI/2;d.position.set(0,0.016,z+3.5);
    g.add(d);
  }
  
  scene.add(g);blocks.set(k,{g,seed,pop:false});
}

function popBlock(key){
  const bk=blocks.get(key);if(!bk||bk.pop)return;bk.pop=true;
  const g=bk.g,seed=bk.seed;
  let s=seed;
  function r(){s=(s*16807)%2147483647;return(s-1)/2147483646;}
  
  const bzs=BS/2-se;
  
  // ═══ PRÉDIOS ═══
  for(let side=-1;side<=1;side+=2){
    const bxC=side*(se+bzs/2);
    const nb=2+Math.floor(Math.abs(r())*3);
    const bw=(BS-3)/nb;
    for(let i=0;i<nb;i++){
      const bzP=-BS/2+1.5+i*bw+bw/2;
      const h=6+Math.abs(r())*35;
      const bGeo=new THREE.BoxGeometry(bzs-0.3,h,bw-0.5);
      const bTex=getTex(T.brick,seed+i*100+side*50);
      bTex.repeat.set(0.7,Math.max(0.5,h/(bw-0.5)*0.7));
      const bldg=new THREE.Mesh(bGeo,new THREE.MeshLambertMaterial({map:bTex}));
      bldg.position.set(bxC,h/2,bzP);bldg.castShadow=true;bldg.receiveShadow=true;g.add(bldg);
    }
  }
  
  // ═══ ÁRVORES ═══
  for(let side=-1;side<=1;side+=2){
    const tx=side*(hr+SW/2);
    for(let tz=-BS/2+5;tz<BS/2-5;tz+=12+r()*15){
      if(Math.abs(r())<0.3)continue;
      const tr=new THREE.Group();
      const th=1.5+r()*3;
      const tk=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.16,th,6),matTree);
      tk.position.y=th/2;tk.castShadow=true;tr.add(tk);
      for(let j=0;j<2+Math.floor(r()*3);j++){
        const cr=0.5+r()*1.2;
        const cn=new THREE.Mesh(new THREE.SphereGeometry(cr,6,4),matLeaf);
        cn.position.set((r()-0.5)*1.4,th+0.3+r()*1.4,(r()-0.5)*1.4);
        cn.castShadow=true;tr.add(cn);
      }
      tr.position.set(tx,0,tz);g.add(tr);
    }
  }
}

function updateWorld(pz){
  const pbz=Math.floor(pz/BS),range=Math.ceil(VD/BS)+1;
  const need=new Set();
  for(let bz=pbz-range;bz<=pbz+range;bz++)for(let bx=-2;bx<=2;bx++)need.add(bx+','+bz);
  for(const[k,v]of blocks){if(!need.has(k)){scene.remove(v.g);blocks.delete(k)}need.delete(k)}
  for(const k of need){const[bx,bz]=k.split(',').map(Number);mkBlock(bx,bz)}
  let d=0;for(const[k,v]of blocks){if(!v.pop&&d<2){popBlock(k);d++}}
}

// ── PLAYER ──
const keys={};
let sprinting=false,holding=false;
const vel=new THREE.Vector3();
const pos=new THREE.Vector3(0,1.7,0);
let maxDist=0,stamina=100,alive=true,grounded=true,jumping=false,jv=0;
let yaw=0,pitch=0,locked=false;

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key==='Shift')sprinting=true;
});
window.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;
  if(e.key==='Shift')sprinting=false;
});

// Mouse look
rnd.domElement.addEventListener('click',()=>{if(!locked){rnd.domElement.requestPointerLock()}});
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===rnd.domElement});
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*0.003;pitch-=e.movementY*0.003;pitch=Math.max(-1.2,Math.min(1.2,pitch))});

// Mobile
document.addEventListener('touchstart',()=>{keys['w']=true;holding=true});
document.addEventListener('touchend',()=>{keys['w']=false;holding=false});

// ── LOOP ──
let lastT=performance.now();

function loop(){
  requestAnimationFrame(loop);
  const n=performance.now();let dt=(n-lastT)/1000;lastT=n;dt=Math.min(dt,0.15);
  
  if(alive){
    const spd=sprinting&&stamina>0?14:8;
    const dir=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),-Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch)).normalize();
    const right=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();
    const move=new THREE.Vector3();
    
    if(keys['w']){move.add(dir);if(!sprinting)sprinting=keys['shift']&&stamina>0}
    if(keys['s'])move.addScaledVector(dir,-0.5);
    if(keys['a'])move.addScaledVector(right,-1);
    if(keys['d'])move.addScaledVector(right,1);
    
    if(move.length()>0){move.normalize();vel.x+=(move.x*spd-vel.x)*Math.min(8*dt,1);vel.z+=(move.z*spd-vel.z)*Math.min(8*dt,1)}
    else{vel.x*=Math.pow(0.1,dt);vel.z*=Math.pow(0.1,dt)}
    
    if(sprinting&&move.length()>0){stamina=Math.max(0,stamina-20*dt);if(stamina<=0)sprinting=false}
    else stamina=Math.min(100,stamina+12*dt);
    
    if(keys[' ']&&grounded){jumping=true;jv=6;grounded=false}
    if(jumping){jv-=15*dt;vel.y=jv}else if(!grounded)vel.y-=15*dt;
    
    pos.x+=vel.x*dt;pos.y+=vel.y*dt;pos.z+=vel.z*dt;
    if(pos.y<=1.7){pos.y=1.7;vel.y=0;grounded=true;jumping=false}
    if(pos.z>maxDist)maxDist=pos.z;
    
    cam.position.copy(pos);
    cam.rotation.order='YXZ';cam.rotation.set(pitch,yaw,0);
    
    if(Math.abs(pos.x)>se+bz2){vel.x*=-0.3;pos.x=Math.sign(pos.x)*(se+bz2)}
    
    updateWorld(pos.z);
  }
  
  // Dia/noite
  const hp=(pos.z/1000)/5,dc=((8+hp)%24)/24,sa=dc*Math.PI*2,sh=Math.sin(sa);
  sun.position.set(Math.cos(sa)*100,sh*100,30);
  const i=Math.max(0.15,sh+0.25);
  sun.intensity=i*4;
  if(sh>-0.1)scene.background=new THREE.Color(0.35+sh*0.3,0.55+sh*0.3,0.82+sh*0.18);
  else{const nf=Math.abs(sh);scene.background=new THREE.Color(0.04+nf*0.06,0.04+nf*0.06,0.12+nf*0.1)}
  
  rnd.render(scene,cam);
}

// ── START ──
$('load').textContent='GERANDO TERRENO...';
// Pre-gera mundo inicial
updateWorld(0);
$('load').style.display='none';
loop();
console.log('🏃 Infinite Runner v10 - MagnorioBR - TERRENO 100%');
</script></body></html>
